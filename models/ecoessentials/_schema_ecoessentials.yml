version: 2

models:
  - name: eco_dim_customer
    description: "Customer Dimensions"
    columns:
      - name: cust_key
        tests:
          - not_null
  - name: eco_dim_date
    description: "Date Dimension"
    columns:
      - name: date_key
        # description: "A foreign key to the customer dimension"
        tests:
          - not_null
  - name: eco_dim_campaign
    description: "Campaign Dimension"
    columns:
      - name: campaign_key
        tests:
          - unique
  - name: eco_dim_product
    description: "Product Dimension"
    columns:
      - name: product_name
        tests:
          - unique
  - name: eco_dim_email
    description: "Email Dimension"
    columns:
      - name: email_key
        tests:
          - not_null
  - name: eco_dim_event
    description: "Event Dimension"
    columns:
      - name: eventtype
        tests:
          - accepted_values:
              arguments:
                values:
                  - "OPEN"
                  - "SENT"
                  - "CLICK"
  - name: eco_dim_time
    description: "Time Dimension"
    columns:
      - name: time_key
        tests:
          - not_null
  - name: eco_fact_sales
    description: "Sales fact"
    columns:
      - name: cust_key
        tests:
          - relationships:
              arguments:
                to: ref('eco_dim_customer') # the model you want to compare to
                field: cust_key # the field on the model you want to compare to
  - name: eco_fact_marketingemail
    description: "Marketing Email fact"
    columns:
      - name: time_key
        tests:
          - not_null


